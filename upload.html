<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luma Library – Upload</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter","ui-sans-serif","system-ui"] }, colors: { neon: { green: "#00FF85", cyan: "#00E5FF", magenta: "#FF2D95" } } } } }
  </script>
  <link rel="stylesheet" href="/workspace/styles.css" />
</head>
<body class="min-h-screen font-sans bg-[#0A0A0A]">
  <div class="bg-orbs"></div>

  <!-- Top Nav (shared) -->
  <header class="fixed top-0 inset-x-0 z-40">
    <div class="container-2xl px-4 py-3">
      <div class="glass-panel glass-rounded flex items-center justify-between px-4 py-2">
        <div class="flex items-center gap-3">
          <button id="mobileMenuBtn" class="md:hidden btn btn-ghost icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6H20M4 12H16M4 18H20" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/></svg></button>
          <a href="/workspace/index.html" class="flex items-center gap-2"><div class="w-8 h-8 rounded-xl glass-panel"></div><span class="text-white/90 text-lg font-semibold tracking-wide">Luma Library</span></a>
        </div>
        <div class="hidden md:flex items-center gap-3 flex-1 max-w-2xl mx-6">
          <div class="relative flex-1">
            <input class="w-full input-glow px-4 py-2.5 pl-10" placeholder="Search the library..." />
            <svg class="absolute left-3 top-1/2 -translate-y-1/2" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="11" r="7" stroke="#9ca3af" stroke-width="1.5"/><path d="M20 20L17 17" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <a href="/workspace/upload.html" class="btn neon-green">Upload</a>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn btn-ghost icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 22s7-4 7-10V6l-7-3-7 3v6c0 6 7 10 7 10Z" stroke="#cbd5e1" stroke-width="1.5"/></svg></button>
          <a href="/workspace/my-library.html" class="hidden md:inline-flex btn btn-ghost">My Library</a>
          <div class="w-9 h-9 rounded-xl glass-panel overflow-hidden"><img src="https://i.pravatar.cc/64?img=8" class="w-full h-full object-cover"/></div>
        </div>
      </div>
    </div>
  </header>

  <!-- Sidebar (shared) -->
  <aside id="sidebar" class="fixed z-30 inset-y-0 left-0 w-72 px-4 pt-20 md:pt-24 pb-6 hidden md:block">
    <nav class="glass-panel glass-rounded h-full p-3 flex flex-col">
      <a class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5" href="/workspace/index.html"><span class="w-6 h-6 rounded-md glass-panel"></span><span>Home</span></a>
      <a class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5" href="/workspace/browse.html"><span class="w-6 h-6 rounded-md glass-panel"></span><span>Browse</span></a>
      <a class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5" href="/workspace/upload.html"><span class="w-6 h-6 rounded-md glass-panel"></span><span>Upload</span></a>
      <a class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5" href="/workspace/my-library.html"><span class="w-6 h-6 rounded-md glass-panel"></span><span>My Library</span></a>
      <a class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5" href="/workspace/admin.html"><span class="w-6 h-6 rounded-md glass-panel"></span><span>Admin</span></a>
      <a class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5" href="/workspace/reader.html"><span class="w-6 h-6 rounded-md glass-panel"></span><span>Reader</span></a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="pt-24 md:pl-80 px-4">
    <div class="container-2xl grid grid-cols-1 lg:grid-cols-12 gap-6">
      <section class="lg:col-span-7 space-y-4">
        <div class="glass-panel glass-card p-5">
          <h1 class="text-white/95 text-2xl font-bold mb-2">Upload Content</h1>
          <p class="text-white/70">Drag and drop files or browse from your device.</p>
          <div class="mt-4">
            <div class="glass-panel glass-card border-dashed border-2 border-white/20 hover:border-neon-cyan/60 p-8 flex flex-col items-center justify-center text-center">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="mb-3"><path d="M12 16V4m0 0 4 4m-4-4-4 4" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round"/><rect x="3" y="12" width="18" height="8" rx="2" stroke="#9ca3af" stroke-width="1.5"/></svg>
              <p class="text-white/80">Drop files here</p>
              <p class="text-white/50 text-sm">MP4, PNG, JPG, PDF up to 2GB</p>
              <button class="btn neon-cyan mt-4">Browse Files</button>
            </div>
          </div>
        </div>

        <div class="glass-panel glass-card p-5">
          <h2 class="text-white/90 font-semibold mb-3">Upload Progress</h2>
          <div class="space-y-3">
            <div>
              <div class="flex items-center justify-between text-sm mb-1"><span class="text-white/70">neural-rendering.mp4</span><span class="text-white/60">62%</span></div>
              <div class="w-full h-2 rounded-full bg-white/10 overflow-hidden">
                <div class="h-full bg-[color:var(--cyan)]" style="width:62%"></div>
              </div>
            </div>
            <div>
              <div class="flex items-center justify-between text-sm mb-1"><span class="text-white/70">prompt-patterns.pdf</span><span class="text-white/60">Uploading...</span></div>
              <div class="w-full h-2 rounded-full bg-white/10 overflow-hidden">
                <div class="h-full bg-[color:var(--magenta)] animate-pulse" style="width:28%"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <aside class="lg:col-span-5">
        <form class="glass-panel glass-card p-5 space-y-4">
          <h3 class="text-white/90 font-semibold">Metadata</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="col-span-1 md:col-span-2">
              <label class="text-white/70 text-sm">Title</label>
              <input class="w-full input-glow px-3 py-2 mt-1" placeholder="Enter title" />
            </div>
            <div>
              <label class="text-white/70 text-sm">Type</label>
              <select class="w-full select-glow px-3 py-2 mt-1"><option>Video</option><option>Article</option><option>Asset</option></select>
            </div>
            <div>
              <label class="text-white/70 text-sm">Category</label>
              <select class="w-full select-glow px-3 py-2 mt-1"><option>AI</option><option>3D</option><option>Design</option></select>
            </div>
            <div class="col-span-1 md:col-span-2">
              <label class="text-white/70 text-sm">Tags</label>
              <input class="w-full input-glow px-3 py-2 mt-1" placeholder="Comma-separated tags" />
            </div>
            <div class="col-span-1 md:col-span-2">
              <label class="text-white/70 text-sm">Description</label>
              <textarea class="w-full input-glow px-3 py-2 mt-1" rows="4" placeholder="Write a short description..."></textarea>
            </div>
          </div>
          <div class="flex items-center justify-end gap-2 pt-2">
            <button type="button" class="btn btn-ghost">Cancel</button>
            <button type="submit" class="btn neon-green">Submit</button>
          </div>
        </form>
      </aside>
    </div>
  </main>

  <script>
    const mobileBtn = document.getElementById('mobileMenuBtn');
    const sidebar = document.getElementById('sidebar');
    if (mobileBtn) mobileBtn.addEventListener('click', () => sidebar.classList.toggle('hidden'));
  </script>
</body>
</html>
