<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luma Library – My Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter","ui-sans-serif","system-ui"] }, colors: { neon: { green: "#00FF85", cyan: "#00E5FF", magenta: "#FF2D95" } } } } }
  </script>
  <link rel="stylesheet" href="/workspace/styles.css" />
</head>
<body class="min-h-screen font-sans bg-[#0A0A0A]">
  <div class="bg-orbs"></div>

  <!-- Top Nav (shared) -->
  <header class="fixed top-0 inset-x-0 z-40">
    <div class="container-2xl px-4 py-3">
      <div class="glass-panel glass-rounded flex items-center justify-between px-4 py-2">
        <div class="flex items-center gap-3">
          <button id="mobileMenuBtn" class="md:hidden btn btn-ghost icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6H20M4 12H16M4 18H20" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/></svg></button>
          <a href="/workspace/index.html" class="flex items-center gap-2"><div class="w-8 h-8 rounded-xl glass-panel"></div><span class="text-white/90 text-lg font-semibold tracking-wide">Luma Library</span></a>
        </div>
        <div class="hidden md:flex items-center gap-3 flex-1 max-w-2xl mx-6">
          <div class="relative flex-1">
            <input class="w-full input-glow px-4 py-2.5 pl-10" placeholder="Search the library..." />
            <svg class="absolute left-3 top-1/2 -translate-y-1/2" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="11" r="7" stroke="#9ca3af" stroke-width="1.5"/><path d="M20 20L17 17" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <a href="/workspace/upload.html" class="btn neon-green">Upload</a>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn btn-ghost icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 22s7-4 7-10V6l-7-3-7 3v6c0 6 7 10 7 10Z" stroke="#cbd5e1" stroke-width="1.5"/></svg></button>
          <a href="/workspace/my-library.html" class="hidden md:inline-flex btn btn-ghost">My Library</a>
          <div class="w-9 h-9 rounded-xl glass-panel overflow-hidden"><img src="https://i.pravatar.cc/64?img=8" class="w-full h-full object-cover"/></div>
        </div>
      </div>
    </div>
  </header>

  <!-- Sidebar (shared) -->
  <aside id="sidebar" class="fixed z-30 inset-y-0 left-0 w-72 px-4 pt-20 md:pt-24 pb-6 hidden md:block">
    <nav class="glass-panel glass-rounded h-full p-3 flex flex-col">
      <a class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5" href="/workspace/index.html"><span class="w-6 h-6 rounded-md glass-panel"></span><span>Home</span></a>
      <a class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5" href="/workspace/browse.html"><span class="w-6 h-6 rounded-md glass-panel"></span><span>Browse</span></a>
      <a class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5" href="/workspace/upload.html"><span class="w-6 h-6 rounded-md glass-panel"></span><span>Upload</span></a>
      <a class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5" href="/workspace/my-library.html"><span class="w-6 h-6 rounded-md glass-panel"></span><span>My Library</span></a>
      <a class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5" href="/workspace/admin.html"><span class="w-6 h-6 rounded-md glass-panel"></span><span>Admin</span></a>
      <a class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5" href="/workspace/reader.html"><span class="w-6 h-6 rounded-md glass-panel"></span><span>Reader</span></a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="pt-24 md:pl-80 px-4">
    <section class="container-2xl">
      <div class="flex items-end justify-between mb-6">
        <div>
          <h1 class="text-2xl md:text-3xl font-bold text-white/95">My Library</h1>
          <p class="text-white/60">Your saved and favorited content</p>
        </div>
        <div class="flex items-center gap-2"><button class="btn btn-ghost">Sort</button><button class="btn btn-ghost">Filter</button></div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
        <article class="glass-panel glass-card overflow-hidden"><div class="thumb h-36"></div><div class="p-4"><h3 class="text-white/90 font-semibold">Realtime Mesh Capture</h3><p class="text-white/60 text-sm">by VFX Lab</p></div></article>
        <article class="glass-panel glass-card overflow-hidden"><div class="thumb h-36"></div><div class="p-4"><h3 class="text-white/90 font-semibold">Vision Transformers 101</h3><p class="text-white/60 text-sm">by ML School</p></div></article>
        <article class="glass-panel glass-card overflow-hidden"><div class="thumb h-36"></div><div class="p-4"><h3 class="text-white/90 font-semibold">Immersive 3D Scenes</h3><p class="text-white/60 text-sm">by XR Lab</p></div></article>
        <article class="glass-panel glass-card overflow-hidden"><div class="thumb h-36"></div><div class="p-4"><h3 class="text-white/90 font-semibold">Prompt Engineering Tips</h3><p class="text-white/60 text-sm">by PromptHub</p></div></article>
      </div>
    </section>
  </main>

  <script>
    const mobileBtn = document.getElementById('mobileMenuBtn');
    const sidebar = document.getElementById('sidebar');
    if (mobileBtn) mobileBtn.addEventListener('click', () => sidebar.classList.toggle('hidden'));
  </script>
</body>
</html>
